<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capturar Produto</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Space+Grotesk:wght@300;500;700&display=swap');

        :root {
            --bg-deep:    #050d1a;
            --bg-card:    rgba(255,255,255,0.04);
            --border:     rgba(0,212,255,0.18);
            --cyan:       #00d4ff;
            --green:      #00ff9d;
            --amber:      #ffb800;
            --text-main:  #e8f4fd;
            --text-muted: #7ba3c0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        /* Background glow */
        body::before {
            content: '';
            position: fixed;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 700px;
            height: 400px;
            background: radial-gradient(ellipse, rgba(0,212,255,0.07) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 860px;
            text-align: center;
        }

        /* ── Header ── */
        .header {
            margin-bottom: 32px;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--cyan);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .eyebrow-line {
            display: inline-block;
            width: 28px;
            height: 1px;
            background: var(--cyan);
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(1.6rem, 4vw, 2.2rem);
            font-weight: 300;
            letter-spacing: -0.01em;
        }

        h1 strong {
            font-weight: 700;
            color: var(--cyan);
        }

        .descricao {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 8px;
        }

        /* ── Camera box ── */
        .camera-wrap {
            position: relative;
            width: 100%;
            max-width: 640px;
            margin: 0 auto 28px;
        }

        .camera-box {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
            background: #0a1628;
            box-shadow: 0 0 0 1px rgba(0,212,255,0.08), 0 24px 60px rgba(0,0,0,0.5);
        }

        /* Corner accents */
        .corner {
            position: absolute;
            width: 22px;
            height: 22px;
            border-color: var(--cyan);
            border-style: solid;
            z-index: 10;
        }
        .corner.tl { top: 10px; left: 10px;  border-width: 2px 0 0 2px; border-radius: 3px 0 0 0; }
        .corner.tr { top: 10px; right: 10px; border-width: 2px 2px 0 0; border-radius: 0 3px 0 0; }
        .corner.bl { bottom: 10px; left: 10px;  border-width: 0 0 2px 2px; border-radius: 0 0 0 3px; }
        .corner.br { bottom: 10px; right: 10px; border-width: 0 2px 2px 0; border-radius: 0 0 3px 0; }

        video {
            width: 100%;
            display: block;
        }

        .scanner {
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--green), transparent);
            box-shadow: 0 0 12px var(--green);
            animation: scanner 2s infinite linear;
            z-index: 5;
        }

        @keyframes scanner {
            0%   { top: 0; }
            50%  { top: 95%; }
            100% { top: 0; }
        }

        /* ── Buttons ── */
        .botoes {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.01em;
            transition: transform 0.25s, box-shadow 0.25s;
        }

        #capturar {
            background: rgba(255,184,0,0.15);
            color: var(--amber);
            border: 1px solid rgba(255,184,0,0.35);
        }

        #capturar:hover {
            transform: translateY(-2px);
            background: rgba(255,184,0,0.22);
            box-shadow: 0 0 24px rgba(255,184,0,0.2);
        }

        .analisar {
            background: linear-gradient(135deg, var(--green), #00c97a);
            color: #050d1a;
            box-shadow: 0 0 24px rgba(0,255,157,0.2);
        }

        .analisar:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 36px rgba(0,255,157,0.35);
        }

        /* ── Status bar ── */
        .status-bar {
            margin-top: 24px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,212,255,0.06);
            border: 1px solid rgba(0,212,255,0.14);
            padding: 8px 20px;
            border-radius: 100px;
            font-size: 0.82rem;
            color: var(--text-muted);
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--green);
            animation: pulse-dot 1.8s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.4; transform: scale(0.7); }
        }

        canvas { display: none; }

        /* ── Loading state ── */
        #loading {
            display: none;
            margin-top: 28px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 28px;
            backdrop-filter: blur(12px);
        }

        #loading h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 6px;
        }

        #loading p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .loader {
            margin: 0 auto;
            width: 44px;
            height: 44px;
            border: 3px solid rgba(0,212,255,0.15);
            border-top: 3px solid var(--cyan);
            border-radius: 50%;
            animation: girar 0.9s linear infinite;
        }

        @keyframes girar {
            to { transform: rotate(360deg); }
        }
    </style>

</head>

<body>

<div class="container">

    <div class="header">
        <div class="eyebrow">
            <span class="eyebrow-line"></span>
            Análise por IA
            <span class="eyebrow-line"></span>
        </div>
        <h1>Capturar <strong>Produto</strong></h1>
        <p class="descricao">Posicione o produto no centro da câmera e capture a imagem para análise.</p>
    </div>

    <div class="camera-wrap">
        <div class="camera-box">
            <div class="corner tl"></div>
            <div class="corner tr"></div>
            <div class="corner bl"></div>
            <div class="corner br"></div>

            <video id="video" autoplay></video>
            <div class="scanner"></div>
        </div>
    </div>

    <img
    id="preview"
    alt="Prévia da foto"
    style="
        display:none;
        max-width:300px;
        margin:20px auto 0;
        border-radius:12px;
        border:1px solid rgba(0,212,255,0.3);
        box-shadow:0 0 20px rgba(0,212,255,0.25);
        #preview{
    display:block;
}
    ">

    <div id="fotoCapturada" class="status-bar" style="display:none; margin-bottom:16px; color: var(--green); border-color: rgba(0,255,157,0.3); background: rgba(0,255,157,0.06);">
        ✅ Foto capturada com sucesso
    </div>

    <div class="botoes">

        <button id="capturar">
            📸 Capturar Foto
        </button>

        <form
            id="formAnalise"
            action="/salvar_imagem"
            method="POST">

            <input
                type="hidden"
                id="imagem"
                name="imagem">

            <button class="analisar" type="submit">
                🤖 Analisar Produto
            </button>

        </form>

    </div>

    <div class="status-bar" id="status">
        <span class="status-dot"></span>
        Sistema de IA pronto para análise
    </div>

    <div id="loading">
        <h2>🤖 Inteligência Artificial em execução</h2>
        <p id="mensagemLoading">Identificando produto...</p>
        <div class="loader"></div>
    </div>

</div>

<canvas id="canvas"></canvas>

<script src="{{ url_for('static', filename='js/camera.js') }}"></script>

<script>
    const mensagens = [
    "📸 Processando imagem...",
    "🧪 Identificando produto...",
    "⚠️ Verificando riscos...",
    "♻️ Analisando descarte...",
    "🌎 Gerando impacto ambiental..."
];

let i = 0;

setInterval(() => {
    const el = document.getElementById("mensagemLoading");
    if (el) {
        el.innerText = mensagens[i % mensagens.length];
        i++;
    }
}, 1200);
document
    .getElementById("formAnalise")
    .addEventListener("submit", function (e) {

        const imagem = document.getElementById("imagem").value;

        if (!imagem) {
            e.preventDefault();
            /* Shake the capture button as a hint */
            const btn = document.getElementById("capturar");
            btn.style.transition = "transform 0.1s";
            [0, -6, 6, -6, 6, 0].forEach((x, i) => {
                setTimeout(() => btn.style.transform = `translateX(${x}px)`, i * 60);
            });
            setTimeout(() => btn.style.transform = "", 360);

            const status = document.getElementById("status");
            status.style.color = "var(--amber)";
            status.style.borderColor = "rgba(255,184,0,0.35)";
            status.style.background  = "rgba(255,184,0,0.07)";
            status.innerHTML = "⚠️ Capture uma foto antes de analisar.";
            setTimeout(() => {
                status.style.color = "";
                status.style.borderColor = "";
                status.style.background  = "";
                status.innerHTML = '<span class="status-dot"></span> Sistema de IA pronto para análise';
            }, 2800);
            return;
        }

        document.getElementById("loading").style.display = "block";
        document.getElementById("status").style.display  = "none";
        document.getElementById("fotoCapturada").style.display = "none";

    });
</script>

</body>
</html>
